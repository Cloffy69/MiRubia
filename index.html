<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>No puedo dejar de pensar en vos</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html, body{
    height:100%;
    width:100%;
}
body{
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background:black;
}

/* FONDO MEJORADO PARA MÓVILES */
.fondo{
    position:relative;
    width:100%;
    height:100dvh; /* más estable en móviles modernos */
    background:url('imagen.jpg') center center / cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Overlay oscuro */
.fondo::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:1;
}

/* MENSAJE CENTRADO VERTICAL Y HORIZONTAL */
.mensaje{
    position:relative;
    z-index:10;
    text-align:center;
    color:white;
    text-shadow:0 0 15px rgba(0,0,0,0.9);
    padding:0 20px;
    width:90%;
    max-width:620px;
}

/* Texto principal */
.mensaje h1{
    font-size:clamp(1.8rem, 7.5vw, 3.4rem);
    font-weight:300;
    line-height:1.15;
    margin-bottom:20px;
}

/* Botón más bonito y táctil */
.boton-musica{
    padding:16px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:16px;
    font-weight:500;
    background:white;
    color:black;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    touch-action:manipulation;
    transition:transform 0.2s;
}

.boton-musica:active{
    transform:scale(0.95);
}

/* Corazones flotantes */
.corazon{
    position:absolute;
    pointer-events:none;
    font-size:26px;
    animation:flotar 2.2s forwards ease-out;
    z-index:999;
    text-shadow:0 0 8px rgba(255,255,255,0.8);
}

@keyframes flotar{
    0%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
    100%{
        opacity:0;
        transform:translate(-50%,-180px) scale(1.8);
    }
}

/* Ajustes para pantallas muy altas (como S23 Ultra) */
@media (max-width: 420px) and (min-height: 800px){
    .mensaje h1{
        font-size:1.75rem;
    }
    .boton-musica{
        padding:15px 24px;
        font-size:15px;
    }
}
</style>
</head>
<body>
<div class="fondo" id="fondo">
    <div class="mensaje">
        <h1>No puedo dejar de pensar en vos ❤️</h1>
        <button class="boton-musica" onclick="reproducirMusica()">
            🎵 Te la dediqué una vez, y te la dedico siempre
        </button>
    </div>
</div>

<script>
const fondo = document.getElementById('fondo');

function crearCorazon(x, y) {
    const corazon = document.createElement('div');
    corazon.classList.add('corazon');
    const corazones = ['❤️','💖','💕','💗','💓'];
    corazon.innerHTML = corazones[Math.floor(Math.random()*corazones.length)];
    corazon.style.left = x + 'px';
    corazon.style.top = y + 'px';
    document.body.appendChild(corazon);
    setTimeout(() => corazon.remove(), 2200);
}

// Click/touch para corazones
fondo.addEventListener('click', (e) => {
    crearCorazon(e.clientX, e.clientY);
});

fondo.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
        const touch = e.touches[0];
        crearCorazon(touch.clientX, touch.clientY);
    }
});

function reproducirMusica() {
    window.open('https://www.youtube.com/watch?v=UsR08cY8k0A', '_blank');
}
</script>
</body>
</html>
