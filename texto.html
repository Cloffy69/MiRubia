<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No puedo dejar de pensar en vos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

.fondo{
    position:relative;
    width:100vw;
    height:100vh;
    background:url('imagen.jpg') center center/cover no-repeat;
}

.fondo::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
}

.mensaje{
    position:absolute;
    bottom:12%;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    text-align:center;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,.8);
}

.mensaje h1{
    font-size:clamp(2rem,5vw,4rem);
    font-weight:300;
}

.boton-musica{
    margin-top:15px;
    padding:12px 24px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    background:white;
}

.corazon{
    position:absolute;
    pointer-events:none;
    font-size:24px;
    animation:flotar 2s forwards ease-out;
    z-index:999;
}

@keyframes flotar{
    0%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
    100%{
        opacity:0;
        transform:translate(-50%,-180px) scale(1.8);
    }
}
</style>
</head>
<body>

<div class="fondo" id="fondo">

    <div class="mensaje">
        <h1>No puedo dejar de pensar en vos ❤️</h1>

        <button class="boton-musica" onclick="reproducirMusica()">
            🎵 Te la dedique una vez, y te la dedicare siempre
        </button>
    </div>

</div>

<audio id="musica">
    <source src="https://www.youtube.com/watch?v=UsR08cY8k0A" type="audio/mpeg">
</audio>

<script>

const fondo = document.getElementById('fondo');

function crearCorazon(x,y){

    const corazon = document.createElement('div');
    corazon.classList.add('corazon');

    const corazones = ['❤️','💖','💕','💗'];

    corazon.innerHTML =
        corazones[Math.floor(Math.random()*corazones.length)];

    corazon.style.left = x + 'px';
    corazon.style.top = y + 'px';

    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },2000);
}

fondo.addEventListener('click',(e)=>{
    crearCorazon(e.clientX,e.clientY);
});

function reproducirMusica(){
    window.open(
        'https://www.youtube.com/watch?v=UsR08cY8k0A',
        '_blank'
    );
}

</script>

</body>
</html>
